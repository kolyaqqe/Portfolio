<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,-apple-system,sans-serif;
background:#0b0b0f;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.hero-title{
font-size:clamp(60px,12vw,180px);
font-weight:500;
letter-spacing:-0.04em;

opacity:0;
transform:scale(.95);
filter:blur(20px);

transition:all 1.8s cubic-bezier(.16,1,.3,1);
}

.hero-sub{
margin-top:18px;
font-size:14px;
letter-spacing:.3em;
text-transform:uppercase;

opacity:0;
transform:translateY(10px);

transition:all 2s cubic-bezier(.16,1,.3,1);
}

.hero-title.visible{
opacity:1;
transform:scale(1);
filter:blur(0);
}

.hero-sub.visible{
opacity:.6;
transform:translateY(0);
}

/* PROJECTS */

.projects-section{
padding:80px 0 160px;
opacity:0;
transform:translateY(60px);
transition:all 1.2s cubic-bezier(.16,1,.3,1);
}

.projects-section.visible{
opacity:1;
transform:translateY(0);
}

.projects{
display:flex;
gap:60px;
padding:0 10vw;
overflow-x:auto;
scroll-behavior:smooth;
}

.projects::-webkit-scrollbar{
display:none;
}

.video-card{
flex:0 0 420px;
height:600px;
border-radius:28px;
overflow:hidden;
background:rgba(255,255,255,.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 20px 60px rgba(0,0,0,.6);
transition:transform .5s cubic-bezier(.16,1,.3,1);
}

.video-card:hover{
transform:scale(1.05);
}

.video-card video{
width:100%;
height:100%;
object-fit:cover;
}

/* NAVIGATION */

.bottom-nav{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);

width:min(600px,92%);
height:70px;

display:flex;
align-items:center;
justify-content:space-around;

border-radius:40px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.12);

z-index:100;
}

.nav-icon{
width:30px;
height:30px;

stroke:white;
stroke-width:1.7;

fill:none;

display:block;

vector-effect: non-scaling-stroke;
}

.nav-icon:hover{
opacity:1;
transform:scale(1.2);

filter:drop-shadow(0 0 10px rgba(255,255,255,0.6));
}

/* MOBILE */

@media(max-width:768px){
.video-card{
flex:0 0 280px;
height:420px;
}
}

</style>

<body>

<script>

/* HERO */

window.addEventListener('load',()=>{
heroTitle.classList.add('visible');
heroSub.classList.add('visible');
});

/* VIDEO LOADER */

const projects=document.getElementById("projects");

const VIDEO_COUNT=15;

for(let i=1;i<=VIDEO_COUNT;i++){

const card=document.createElement("div");
card.className="video-card";

const video=document.createElement("video");

video.src = "https://raw.githubusercontent.com/kolyaqqe/Portfolio/main/video/" + i + ".mp4";
video.autoplay=true;
video.muted=true;
video.loop=true;
video.playsInline=true;

card.appendChild(video);
projects.appendChild(card);

/* Hover sound */

card.addEventListener("mouseenter",()=>{
video.muted=false;
});

/* Hover Sound Fix (stable version) */

card.addEventListener("mouseenter", () => {
    video.muted = false;

    if (video.paused) {
        video.play().catch(()=>{});
    }

    video.volume = 0.6;
});

card.addEventListener("mouseleave", () => {
    video.muted = true;
});

}

/* SCROLL */

window.addEventListener('scroll',()=>{

const scroll=window.scrollY;
const fadeDistance=window.innerHeight*0.8;
const progress=Math.min(scroll/fadeDistance,1);

heroTitle.style.transform=
`translateY(-${progress*150}px) scale(${1-progress*0.1})`;

heroTitle.style.opacity=1-progress;
heroTitle.style.filter=`blur(${progress*25}px)`;

heroSub.style.opacity=0.6-progress*0.6;

if(scroll>window.innerHeight*0.4){
projectsSection.classList.add('visible');
}

});

/* HORIZONTAL SCROLL */

projects.addEventListener('wheel',(e)=>{
if(e.deltaY!==0){
e.preventDefault();
projects.scrollLeft+=e.deltaY;
}
},{passive:false});

</script>
