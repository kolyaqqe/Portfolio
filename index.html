<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,-apple-system,sans-serif;
background:#0b0b0f;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.hero-title{
font-size:clamp(60px,12vw,180px);
font-weight:500;
letter-spacing:-0.04em;
opacity:0;
transform:scale(.95);
filter:blur(20px);
transition:all 1.8s cubic-bezier(.16,1,.3,1);
}

.hero-sub{
margin-top:18px;
font-size:14px;
letter-spacing:.3em;
text-transform:uppercase;
opacity:0;
transform:translateY(10px);
transition:all 2s cubic-bezier(.16,1,.3,1);
}

.hero-title.visible{
opacity:1;
transform:scale(1);
filter:blur(0);
}

.hero-sub.visible{
opacity:.6;
transform:translateY(0);
}

/* PROJECTS */

.projects-section{
padding:0 0 250px;
margin-top:-185px;

display:flex;
justify-content:center;
align-items:flex-start;

}

.projects{
display:flex;
gap:40px;
padding:40px 10vw 0;

overflow-x:auto;
scroll-behavior:smooth;

/* ===== Edge Blur Mask ===== */

mask-image:linear-gradient(
    to right,
    transparent,
    black 20%,
    black 80%,
    transparent
);

-webkit-mask-image:linear-gradient(
    to right,
    transparent,
    black 20%,
    black 80%,
    transparent
);
}

.projects::-webkit-scrollbar{
display:none;
}

/* VIDEO CARD ANIMATION */

.video-card{
flex:0 0 420px;
height:600px;
border-radius:28px;
overflow:hidden;
position:relative;

background:rgba(255,255,255,.04);

box-shadow:
0 20px 60px rgba(0,0,0,.6),
inset 0 0 0 1px rgba(255,255,255,.05);

opacity:0;
transform:translateY(80px);

filter:blur(20px);

-webkit-backface-visibility:hidden;
backface-visibility:hidden;

transform:translateZ(0);
will-change:transform,opacity,filter;

transition:
transform 1s cubic-bezier(.16,1,.3,1),
opacity 1s ease,
filter 1s ease;
}

.video-card.visible{
opacity:1;
transform:translateY(0);
filter:blur(0);
}

.video-card:hover{
transform:translateY(-14px);
box-shadow:0 60px 150px rgba(0,0,0,.85);
}

.video-card video{
width:100%;
height:100%;
object-fit:cover;
transition:transform .8s cubic-bezier(.16,1,.3,1);
}

.video-card:hover video{
transform:scale(1.08);
}

/* NAVIGATION */

.bottom-nav{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:min(600px,92%);
height:70px;
display:flex;
align-items:center;
justify-content:space-around;
border-radius:40px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.12);
z-index:100;
}

.nav-icon{
width:30px;
height:30px;
stroke:white;
stroke-width:1.7;
fill:none;
display:block;
vector-effect:non-scaling-stroke;
transition:all .3s ease;
}

.nav-icon:hover{
transform:scale(1.2);
filter:drop-shadow(0 0 12px rgba(255,255,255,0.6));
}

/* MOBILE */

@media(max-width:768px){
.video-card{
flex:0 0 280px;
height:420px;
}
}

</style>

<body>

<script>

window.addEventListener('load',()=>{
heroTitle.classList.add('visible');
heroSub.classList.add('visible');
});

const projects=document.getElementById("projects");
const VIDEO_COUNT=15;

for(let i=1;i<=VIDEO_COUNT;i++){

const card=document.createElement("div");
card.className="video-card";

const video=document.createElement("video");
video.src="./videos/"+i+".mp4";
video.autoplay=true;
video.muted=true;
video.loop=true;
video.playsInline=true;
video.preload="auto";

card.appendChild(video);
projects.appendChild(card);

card.addEventListener("mouseenter",()=>{
video.muted=false;
video.volume=0.6;
if(video.paused){
video.play().catch(()=>{});
}
});

card.addEventListener("mouseleave",()=>{
video.muted=true;
});

}

window.addEventListener('scroll',()=>{

const scroll=window.scrollY;
const fadeDistance=window.innerHeight*0.8;
const progress=Math.min(scroll/fadeDistance,1);

heroTitle.style.transform=
`translateY(-${progress*150}px) scale(${1-progress*0.1})`;

heroTitle.style.opacity=1-progress;
heroTitle.style.filter=`blur(${progress*25}px)`;

heroSub.style.opacity=0.6-progress*0.6;

const cards=document.querySelectorAll(".video-card");

cards.forEach(card=>{
const rect=card.getBoundingClientRect();
const trigger=window.innerHeight*0.6;

if(rect.top<trigger){
card.classList.add("visible");
}else{
card.classList.remove("visible");
}
});

});

projects.addEventListener('wheel',(e)=>{
if(e.deltaY!==0){
e.preventDefault();
projects.scrollLeft+=e.deltaY;
}
},{passive:false});


</script>
